<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-color: grey;
        }



        /* 1. Container for the whole line */
        .row {
            display: flex;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
            justify-content: center;
            scale: .9;
            /* NEW: Allows groups to drop to the next line if screen is too small */
        }

        .item {
            --item-width: 400px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* mensi wrapper */
        .group {
            display: flex;
            gap: 0;
            cursor: pointer;
            transition: gap 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .group:hover {
            gap: 10px;
        }

        .item.prime {
            max-width: 0;
            /* Hides the element */
            opacity: 0;
            transition: max-width 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .group:hover .item.prime {
            max-width: 700px;
            opacity: 1;
        }


        .item img {
            width: var(--item-width);
            min-width: var(--item-width);
            max-width: var(--item-width);
            height: 130px;
            display: block;
        }


    </style>
</head>

<body>
    <div class="row">
        <!-- Souls -->
        <div class="group">
            <div class="darkSouls item prime" style="--item-width:100%;"><a href=""><img class="darkSouls" src="img/header/DarkS/image1.png" alt="Dark Souls"></a>
            </div>
            <div class="item prime"><a href=""><img src="img/header/DS/demons.png" alt="Demon's'"></a></div>
            <div class="item main"><a href=""><img src="img/header/DS/souls.png" alt="Souls"></a></div>
        </div>
        <!-- Borne -->
        <div class="group">
            <div class="item prime"><a href=""><img src="img/header/BB/blood.png" alt="Blood'"></a></div>
            <div class="item main"><a href=""><img src="img/header/BB/borne.png" alt="borne"></a></div>
        </div>
        <!-- Kiro -->
        <div class="group">
            <div class="item prime" style="--item-width:var(--item-width);"><a href=""><img src="img/header/SSDT/se.png" alt="Se"></a></div>
            <div class="item main"><a href=""><img src="img/header/SSDT/kiro.png" alt="kiro"></a></div>
        </div>
        <!-- Ring -->
        <div class="group">
            <div class="er item prime"><a href=""><img src="img/header/ER/elden.png" alt="Elden'"></a></div>
            <div class="item main"><a href=""><img src="img/header/ER/ring.png" alt="Ring"></a></div>
        </div>
    </div>
</body>

</html>
